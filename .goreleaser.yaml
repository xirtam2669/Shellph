version: 2

project_name: shellph

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: shellph
    main: ./cmd/shellph/main.go
    binary: shellph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc